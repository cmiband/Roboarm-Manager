    <h1>Connect to local bluetooth service</h1>

        <label class="input-label" for="config-file"><abbr class="required-asterisk">*</abbr>Configuration file: </label>
        <input (change)="handleFileChange($event)" id="config-file" class="config-upload-button" type="file" accept=".txt">
    </div>
</div>
