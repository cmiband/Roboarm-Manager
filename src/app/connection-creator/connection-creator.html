<div class="view-container">
    <h1>Connect to local bluetooth service</h1>
    <div class="input-container">
        <label class="input-label" for="server"><abbr class="required-asterisk">*</abbr>Local server address: </label>
        <input class="text-input" id="server" type="text" [(ngModel)]="serverAddress" required/>
        @if(showValidationError()) {
            <span class="validation-text"></span>
        }
    </div>
    <button class="button-brand connect-button" (click)="handleConnect()">Connect</button>
</div>
